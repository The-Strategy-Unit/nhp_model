on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build-app:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout GitHub Action"
        uses: actions/checkout@v6

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Build (release)
        if: github.ref_type == 'tag'
        run: uv build

      - name: Build (dev)
        if: github.ref == 'refs/heads/main'
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: 0.dev0
        run: uv build

      - name: Generate artifact
        uses: actions/upload-artifact@v6
        with:
          name: dist-whl
          path: dist

  upload-build-to-py-pi:
    runs-on: ubuntu-latest
    needs: ["build-app"]
    environment: build-app
    if: github.ref_type == 'tag'

    permissions:
      id-token: write

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: dist-whl
          path: .

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0

  upload-build-to-storage-account:
    runs-on: ubuntu-latest
    needs: ["build-app"]
    environment: build-app

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: dist-whl
          path: .

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Upload to blob storage
        run: |
          az storage blob upload \
            --auth-mode login \
            --account-name ${{ secrets.NHP_STORAGE_ACCOUNT }} \
            --container-name app \
            --file $(ls dist/*.whl) \
            --overwrite

  add-build-to-release:
    runs-on: ubuntu-latest
    needs: ["build-app"]
    permissions:
      contents: write

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: dist-whl
          path: .
      - name: Upload artifact to the GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          files: "dist/*.whl"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
