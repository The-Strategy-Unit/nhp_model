on:
  workflow_call:
    inputs:
      app-version:
        required: true
        type: string  
      data-version:
        required: true
        type: string  
      latest:
        required: false
        default: false
        type: boolean
    secrets:
      AZURE_CREDENTIALS:
        required: true
      REGISTRY_LOGIN_SERVER:
        required: true
      REGISTRY_USERNAME:
        required: true
      REGISTRY_PASSWORD:
        required: true
      NHP_STORAGE_ACCOUNT:
        required: true

jobs:
  get-version:
    runs-on: ubuntu-latest
    env:
      VERSION: dev
    outputs:
      version: ${{ steps.set-outputs.outputs.VERSION }}
    steps:
      - name: Update version (production)
        if: ${{ inputs.latest }}
        run: |
          VERSION=$(echo ${{ inputs.app-version }} | awk 'BEGIN { FS="."; } { print $1"."$2; }')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Set outputs
        id: set-outputs
        run: echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: [get-version]
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v4

      - name: 'Set up Docker Buildx'
        uses: docker/setup-buildx-action@v3

      - name: 'Login to GHCR'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Login to ACR'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: 'Build and push to both registries'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/the-strategy-unit/nhp_model:${{ needs.get-version.outputs.version }}
            ${{ secrets.REGISTRY_LOGIN_SERVER }}/nhp_model:${{ needs.get-version.outputs.version }}
            ${{ inputs.latest && format('ghcr.io/the-strategy-unit/nhp_model:latest,{0}/nhp_model:latest', secrets.REGISTRY_LOGIN_SERVER) || '' }}
          build-args: |
            app_version=${{ inputs.app-version }}
            data_version=${{ inputs.data-version }}
            storage_account=${{ secrets.NHP_STORAGE_ACCOUNT }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
